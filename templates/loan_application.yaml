name: Commercial Loan Application
description: Collect key details for commercial lending review
questions:
  - id: business_name
    question: What is the legal name of the business entity applying for the loan?
    judge_prompt: >
      Accept any answer that looks like a business or company name. Examples:
      'ACME Corp', 'Smith & Sons', 'TechStart Inc'. Only reject obviously
      non-name answers like 'my company', 'N/A', or blank responses.

  - id: loan_amount
    question: What is the requested loan amount and currency?
    judge_prompt: >
      Must include a specific dollar amount (e.g., '$2.5M', '$500,000'). Must
      also specify currency if not USD. Reject answers without a number.

  - id: loan_purpose
    question: What is the intended use of the loan proceeds?
    judge_prompt: >
      Must describe a specific business purpose (e.g., 'equipment purchase',
      'working capital for seasonal inventory', 'commercial real estate
      acquisition'). Should be detailed enough to assess risk. Reject generic
      answers like 'business needs'.

  - id: annual_revenue
    question: What is the company's annual revenue for the most recent fiscal year?
    judge_prompt: >
      Must include a specific dollar figure or range (e.g., '$12M', '$5-8M').
      Should reference a time period. Reject answers that don't include a number.

  - id: collateral
    question: What collateral, if any, is available to secure this loan?
    judge_prompt: >
      Must describe specific assets (e.g., 'commercial property at 123 Main St
      valued at $3M', 'accounts receivable', 'equipment'). If unsecured, must
      explicitly state 'no collateral / unsecured'. Reject vague answers like
      'we have assets'.

  - id: existing_debt
    question: What existing debt obligations does the business currently hold?
    judge_prompt: >
      Must list specific obligations with amounts or state 'no existing debt'.
      Examples: '$1.2M term loan with Bank X, $500K line of credit'. Reject
      answers that dodge the question or say 'some loans'.
